<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRINGE DRIVER</title>

<style>
body{margin:0;background:#000;font-family:monospace;color:#fff;overflow:hidden}

/* MENU */
#menuScreen{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  gap:20px;
  background:black;
}

.title{
  font-size:40px;
  color:#ffe600;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3}
}

.menuBox{
  display:flex;
  flex-direction:column;
  gap:10px;
}

select,input{
  font-size:18px;
  padding:10px;
  width:220px;
}

button{
  font-size:20px;
  padding:12px;
  background:#ffe600;
  border:none;
  cursor:pointer;
}

.preview{
  width:80px;height:120px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid #fff;
}

/* GAME */
#gameScreen{display:none;}
canvas{display:block;margin:auto;background:#111;}

#hud{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  color:#0ff;
}
</style>
</head>

<body>

<div id="menuScreen">
  <div class="title">CRINGE DRIVER</div>

  <div class="preview" id="preview"></div>

  <div class="menuBox">
    <input id="pseudo" value="Joueur">

    <select id="vehicle">
      <option value="clio">Clio</option>
      <option value="truck">Truck</option>
    </select>

    <select id="difficulty">
      <option value="easy">Facile</option>
      <option value="hard">Hardcore</option>
    </select>

    <button id="startBtn">START</button>
  </div>
</div>

<div id="gameScreen">
  <canvas id="game" width="360" height="640"></canvas>
  <div id="hud"></div>
</div>

<script>
const preview = document.getElementById("preview");
const vehicleSelect = document.getElementById("vehicle");

function updatePreview(){
  preview.innerHTML="";
  let box=document.createElement("div");
  box.style.width="40px";
  box.style.height="60px";
  box.style.background=vehicleSelect.value==="clio"?"red":"blue";
  preview.appendChild(box);
}
vehicleSelect.addEventListener("change",updatePreview);
updatePreview();

/* GAME */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let playerLane=1,score=0,speed=2;
let pseudo="",vehicle="clio";
const lanes=[80,180,280];
let obstacles=[];
let gameStarted=false;

function startGame(){
  pseudo=document.getElementById("pseudo").value;
  vehicle=vehicleSelect.value;

  document.getElementById("menuScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";

  gameStarted=true;
}
document.getElementById("startBtn").onclick=startGame;

canvas.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(dx>30 && playerLane<2) playerLane++;
  if(dx<-30 && playerLane>0) playerLane--;
});

function spawnObstacle(){
  let lane=Math.floor(Math.random()*3);
  if(Math.random()<0.2){
    lane=Math.floor(Math.random()*2);
    obstacles.push({lane,y:-100,width:2});
  }else{
    obstacles.push({lane,y:-50,width:1});
  }
}

function update(){
  if(!gameStarted)return;

  score++;
  if(score%200===0)speed+=0.2;
  if(Math.random()<0.02)spawnObstacle();

  obstacles.forEach(o=>{
    o.y+=speed;

    if(o.width===1 && Math.abs(o.y-550)<40 && o.lane===playerLane) crash();
    if(o.width===2 && Math.abs(o.y-550)<40 &&
      (playerLane===o.lane||playerLane===o.lane+1)) crash();
  });

  obstacles=obstacles.filter(o=>o.y<700);
  draw();
}

function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,360,640);

  ctx.fillStyle="#333";
  ctx.fillRect(40,0,280,640);

  ctx.fillStyle=vehicle==="clio"?"red":"blue";
  ctx.fillRect(lanes[playerLane]-20,550,40,60);

  ctx.fillStyle="gray";
  obstacles.forEach(o=>{
    ctx.fillRect(lanes[o.lane]-20,o.y,40*o.width,60);
  });

  document.getElementById("hud").innerText=
    pseudo+" | Score "+score;
}

function crash(){
  navigator.vibrate && navigator.vibrate(200);
  alert("GAME OVER\nScore:"+score);
  location.reload();
}

setInterval(update,16);
</script>

</body>
</html>
