<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRINGE DRIVER</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#fff;
  overflow:hidden;
}

/* ===== MENU ===== */
#menuScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
  background:#000;
  z-index:10;
}

.title{
  font-size:32px;
  color:#ffe600;
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0.3}
}

select,input,button{
  font-size:18px;
  padding:10px;
  width:220px;
}

button{
  background:#ffe600;
  border:none;
}

/* ===== GAME ===== */
#gameScreen{
  display:none;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
}

#hud{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:#0ff;
  font-size:18px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuScreen">
  <div class="title">CRINGE DRIVER</div>

  <input id="pseudo" value="Joueur">

  <select id="vehicle">
    <option value="clio">Clio</option>
    <option value="truck">Truck</option>
  </select>

  <select id="difficulty">
    <option value="easy">Facile</option>
    <option value="hard">Hardcore</option>
  </select>

  <button id="startBtn">START</button>
</div>

<!-- GAME -->
<div id="gameScreen">
  <canvas id="game" width="360" height="640"></canvas>
  <div id="hud"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ===== VARIABLES ===== */
let gameStarted = false;
let playerLane = 1;
let score = 0;
let speed = 2;

let pseudo = "Joueur";
let vehicle = "clio";

const lanes = [80,180,280];
let obstacles = [];

/* ===== START ===== */
function startGame(){
  pseudo = document.getElementById("pseudo").value;
  vehicle = document.getElementById("vehicle").value;

  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  gameStarted = true;
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("startBtn").addEventListener("touchstart", function(e){
  e.preventDefault();
  startGame();
});

/* ===== CONTROLES MOBILE ===== */
let startX = null;

canvas.addEventListener("touchstart",function(e){
  startX = e.touches[0].clientX;
});

canvas.addEventListener("touchend",function(e){
  let dx = e.changedTouches[0].clientX - startX;
  if(dx > 30 && playerLane < 2) playerLane++;
  if(dx < -30 && playerLane > 0) playerLane--;
});

/* ===== VIBRATION ===== */
function vibrate(type){
  if(!navigator.vibrate) return;

  if(type==="move") navigator.vibrate(20);
  if(type==="hit") navigator.vibrate(200);
  if(type==="bonus") navigator.vibrate([50,50,50]);
}

/* ===== OBSTACLES ===== */
function spawnObstacle(){
  let lane = Math.floor(Math.random()*3);

  if(Math.random() < 0.2){
    lane = Math.floor(Math.random()*2);
    obstacles.push({lane:lane,y:-100,width:2});
  }else{
    obstacles.push({lane:lane,y:-50,width:1});
  }
}

/* ===== UPDATE ===== */
function update(){
  if(!gameStarted) return;

  score++;

  if(score % 200 === 0){
    speed += 0.15;
  }

  if(Math.random() < 0.02){
    spawnObstacle();
  }

  obstacles.forEach(function(o){
    o.y += speed;

    if(o.width === 1 && Math.abs(o.y-550)<40 && o.lane === playerLane){
      crash();
    }

    if(o.width === 2 && Math.abs(o.y-550)<40 &&
      (playerLane===o.lane || playerLane===o.lane+1)){
      crash();
    }
  });

  obstacles = obstacles.filter(function(o){
    return o.y < 700;
  });

  draw();
}

/* ===== DRAW ===== */
function draw(){

  // fond
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,360,640);

  // route
  ctx.fillStyle="#333";
  ctx.fillRect(40,0,280,640);

  // lignes route
  ctx.fillStyle="#fff";
  for(let i=0;i<640;i+=40){
    ctx.fillRect(160,i,4,20);
    ctx.fillRect(260,i,4,20);
  }

  // joueur
  ctx.fillStyle = vehicle==="clio" ? "#ff2f2f" : "#00aaff";
  ctx.fillRect(lanes[playerLane]-20,550,40,60);

  // obstacles
  ctx.fillStyle="#888";
  obstacles.forEach(function(o){
    ctx.fillRect(lanes[o.lane]-20,o.y,40*o.width,60);
  });

  document.getElementById("hud").innerText =
    pseudo + " | Score : " + score;
}

/* ===== CRASH ===== */
function crash(){
  vibrate("hit");
  alert("GAME OVER\\nScore : " + score);
  location.reload();
}

/* ===== LOOP ===== */
setInterval(update,16);
</script>

</body>
</html>
